spring.config.import=optional:file:.env[.properties]

# Server
server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/${DB_NAME:gongdb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.orm.jdbc.bind=trace
logging.level.com.gong.modu.security.HttpCookieOAuth2AuthorizationRequestRepository=debug

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASSWORD:}

# Youtube Data API key
youtube.api-key=${YOUTUBE_API_KEY}
# 사전에 정의된 YouTube 채널 ID 목록
youtube.channel-ids=UCsJ6RuBiTVWRX156FVbeaGg,UCiHCmazdsMM9j3Jbqx3p7Ig,UC_JXWoZ2DQB98xFiKLPrVEQ,UCwXOKS-z1t9u6Axmm3blXug,UCxfko2YOD6DODYRGzeOPhIQ,UCOB62fKRT7b73X7tRxMuN2g,UCJo6G1u0e_-wS-JQn3T-zEw,UChlv4GSd7OQl3js-jkLOnFA
# 채널 하나당 최신 영상 몇 개를 가져올지
youtube.latest-video-count-per-channel=5
# 자막 없는 영상이 나올 경우 최대 몇 번까지 다른 영상으로 재시도할지
youtube.transcript-retry-count=10

# OAuth2
#spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
#spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
#spring.security.oauth2.client.registration.google.scope=profile,email

# JWT
jwt.secret-key=${JWT_SECRET_KEY}
jwt.access-token-expiration=1800000
jwt.refresh-token-expiration=604800000

# Email (Gmail ??)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# OAuth2 - Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/api/v1/auth/oauth2/callback/google

# OAuth2 - Kakao
spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_CLIENT_ID}
spring.security.oauth2.client.registration.kakao.client-secret=${KAKAO_CLIENT_SECRET}
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.redirect-uri={baseUrl}/api/v1/auth/oauth2/callback/kakao
spring.security.oauth2.client.registration.kakao.scope=profile_nickname
spring.security.oauth2.client.registration.kakao.client-name=Kakao
spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

# Email Verification
email.verification.expiration=300

# Password Reset
password.reset.expiration=30

# Claude LLM (anthropic)
anthropic.api-key=${ANTHROPIC_API_KEY}
anthropic.model=${ANTHROPIC_MODEL}
anthropic.api-url=${ANTHROPIC_API_URL}

# Frontend URL (CORS ? OAuth2 ????? ?)
app.frontend-url=${FRONTEND_URL:http://localhost:3000}